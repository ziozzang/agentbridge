# AgentBridge — default provider templates.
#
# Each entry under `providers:` is selectable via the env variable
# AGENTBRIDGE_PROVIDER=<name>. Values use shell-style ${VAR} expansion so a
# single template can pick up its credential from the user's environment.
#
# Override this file with AGENTBRIDGE_PROVIDERS_FILE=/path/to/my.yaml or by
# placing a file at $XDG_CONFIG_HOME/agentbridge/providers.yaml.

providers:
  # --------- GLM / Z.AI Coding Plan (Chat Completions compat) -------------
  glm:
    kind: glm
    base_url: ${AGENTBRIDGE_GLM_BASE_URL:-${ACP_GLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}}
    api_key: ${Z_AI_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${AGENTBRIDGE_GLM_MODEL:-${ACP_GLM_MODEL:-glm-5.1}}
    max_tokens: 8192
    context_window: 200000
    models:
      - id: glm-5.1
        name: GLM-5.1
        description: Latest GLM reasoning model with thinking mode
      - id: glm-5-turbo
        name: GLM-5 Turbo
        description: Faster Coding Plan reasoning model
      - id: glm-4.7
        name: GLM-4.7
        description: 200K-context reasoning model
      - id: glm-4.5-air
        name: GLM-4.5 Air
        description: Lightweight, lower-latency model

  # --------- OpenAI Chat Completions --------------------------------------
  openai:
    kind: openai-chat
    base_url: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    api_key: ${OPENAI_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${OPENAI_MODEL:-gpt-4.1-mini}
    max_tokens: 4096
    context_window: 1000000
    models:
      - id: gpt-4.1
        name: GPT-4.1
        description: General-purpose flagship
      - id: gpt-4.1-mini
        name: GPT-4.1 mini
        description: Cost-efficient general model
      - id: gpt-4o
        name: GPT-4o
        description: Multimodal flagship
      - id: gpt-4o-mini
        name: GPT-4o mini
        description: Lower-cost multimodal

  # --------- OpenAI Responses API ----------------------------------------
  openai-responses:
    kind: openai-responses
    base_url: ${OPENAI_BASE_URL:-https://api.openai.com}
    api_key: ${OPENAI_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${OPENAI_MODEL:-gpt-5}
    max_tokens: 4096
    context_window: 400000
    models:
      - id: gpt-5
        name: GPT-5
        description: Responses-API flagship
      - id: gpt-5-mini
        name: GPT-5 mini
        description: Smaller Responses model
      - id: o4-mini
        name: o4-mini
        description: Reasoning-focused Responses model

  # --------- Anthropic Messages ------------------------------------------
  anthropic:
    kind: anthropic
    base_url: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
    api_key: ${ANTHROPIC_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
    max_tokens: 8192
    context_window: 200000
    extra:
      anthropic_version: "2023-06-01"
    models:
      - id: claude-opus-4-5
        name: Claude Opus 4.5
        description: Flagship reasoning model
      - id: claude-sonnet-4-5
        name: Claude Sonnet 4.5
        description: Balanced general model
      - id: claude-haiku-4-5
        name: Claude Haiku 4.5
        description: Fast lightweight model

  # --------- Claude Code CLI ---------------------------------------------
  claude-code:
    kind: claude-code-cli
    default_model: ${CLAUDE_CODE_MODEL:-sonnet}
    context_window: 200000
    extra:
      command: ${CLAUDE_CODE_COMMAND:-claude}
      permission_mode: ${CLAUDE_CODE_PERMISSION_MODE:-default}
      tools: ${CLAUDE_CODE_TOOLS:-}
      allowed_tools: ${CLAUDE_CODE_ALLOWED_TOOLS:-}
      disallowed_tools: ${CLAUDE_CODE_DISALLOWED_TOOLS:-}
      system_prompt: ${CLAUDE_CODE_SYSTEM_PROMPT:-}
      append_system_prompt: ${CLAUDE_CODE_APPEND_SYSTEM_PROMPT:-}
      bare: ${CLAUDE_CODE_BARE:-false}
      no_session_persistence: ${CLAUDE_CODE_NO_SESSION_PERSISTENCE:-false}
    models:
      - id: sonnet
        name: Claude Sonnet (Claude Code)
      - id: opus
        name: Claude Opus (Claude Code)
      - id: claude-sonnet-4-6
        name: Claude Sonnet 4.6

  # --------- Ollama (native /api/chat) -----------------------------------
  ollama:
    kind: ollama
    base_url: ${OLLAMA_BASE_URL:-http://localhost:11434}
    api_key: ${OLLAMA_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${OLLAMA_MODEL:-llama3.1}
    max_tokens: 4096
    context_window: 32000
    models:
      - id: llama3.1
        name: Llama 3.1
      - id: qwen2.5
        name: Qwen 2.5
      - id: deepseek-r1
        name: DeepSeek R1

  # --------- OpenRouter (Chat Completions + Referer header) --------------
  openrouter:
    kind: openai-chat
    base_url: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    api_key: ${OPENROUTER_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4.5}
    max_tokens: 4096
    context_window: 200000
    headers:
      HTTP-Referer: ${OPENROUTER_REFERER:-https://github.com/ziozzang/agentbridge}
      X-Title: ${OPENROUTER_APP_TITLE:-agentbridge}
    models:
      - id: anthropic/claude-sonnet-4.5
        name: Claude Sonnet 4.5 (via OpenRouter)
      - id: openai/gpt-4.1
        name: GPT-4.1 (via OpenRouter)
      - id: deepseek/deepseek-chat
        name: DeepSeek Chat (via OpenRouter)
      - id: google/gemini-2.5-pro
        name: Gemini 2.5 Pro (via OpenRouter)

  # --------- xAI Grok (API key) ------------------------------------------
  xai:
    kind: openai-responses
    base_url: ${XAI_BASE_URL:-https://api.x.ai/v1}
    api_key: ${XAI_API_KEY:-${AGENTBRIDGE_XAI_API_KEY}}
    default_model: ${XAI_MODEL:-grok-4.3}
    max_tokens: 4096
    context_window: 1000000
    extra:
      responses_path: ${XAI_RESPONSES_PATH:-/responses}
      service_tier: ${XAI_SERVICE_TIER:-}
    models:
      - id: grok-4.3
        name: Grok 4.3
      - id: grok-4.20-0309-reasoning
        name: Grok 4.20 Reasoning
      - id: grok-4.20-0309-non-reasoning
        name: Grok 4.20 Non-Reasoning

  # --------- xAI Grok OAuth (SuperGrok / X Premium+) ---------------------
  # Uses ~/.grok/auth.json by default. A Hermes ~/.hermes/auth.json
  # xai-oauth entry is accepted as a fallback during migration.
  xai-oauth:
    kind: openai-responses
    base_url: ${XAI_BASE_URL:-https://api.x.ai/v1}
    api_key: oauth:xai
    default_model: ${XAI_MODEL:-grok-4.3}
    max_tokens: 4096
    context_window: 1000000
    extra:
      responses_path: ${XAI_RESPONSES_PATH:-/responses}
      service_tier: ${XAI_SERVICE_TIER:-}
    models:
      - id: grok-4.3
        name: Grok 4.3
      - id: grok-4.20-0309-reasoning
        name: Grok 4.20 Reasoning
      - id: grok-4.20-0309-non-reasoning
        name: Grok 4.20 Non-Reasoning

  # --------- LiteLLM proxy (OpenAI-compatible) ---------------------------
  litellm:
    kind: openai-chat
    base_url: ${LITELLM_BASE_URL:-http://localhost:4000/v1}
    api_key: ${LITELLM_API_KEY:-${AGENTBRIDGE_API_KEY:-${ACP_HARNESS_API_KEY}}}
    default_model: ${LITELLM_MODEL:-gpt-4.1}
    max_tokens: 4096
    context_window: 200000

  # --------- Codex (ChatGPT Codex backend behind OAuth) ------------------
  # Resolve the bearer token and ChatGPT account id from Codex CLI auth
  # (`~/.codex/auth.json`) or AGENTBRIDGE_CODEX_* overrides.
  codex:
    kind: openai-responses
    base_url: ${CODEX_BASE_URL:-https://chatgpt.com/backend-api/codex}
    api_key: oauth:codex
    default_model: ${CODEX_MODEL:-gpt-5.5}
    max_tokens: 4096
    context_window: 400000
    headers:
      version: ${CODEX_CLIENT_VERSION:-agentbridge}
    extra:
      responses_path: ${CODEX_RESPONSES_PATH:-/responses}
      instructions: ${CODEX_INSTRUCTIONS:-You are a concise coding assistant.}
      prompt_cache_key: ${CODEX_PROMPT_CACHE_KEY:-agentbridge}
      reasoning_effort: ${CODEX_REASONING_EFFORT:-medium}
      include_reasoning_encrypted: true
      omit_max_output_tokens: true
      service_tier: ${CODEX_SERVICE_TIER:-}
      web_search: ${CODEX_WEB_SEARCH:-cached}
      tools:
        web_search:
          context_size: ${CODEX_WEB_SEARCH_CONTEXT_SIZE:-}
          allowed_domains: ${CODEX_WEB_SEARCH_ALLOWED_DOMAINS:-}
          location:
            country: ${CODEX_WEB_SEARCH_COUNTRY:-}
            region: ${CODEX_WEB_SEARCH_REGION:-}
            city: ${CODEX_WEB_SEARCH_CITY:-}
            timezone: ${CODEX_WEB_SEARCH_TIMEZONE:-}
    models:
      - id: gpt-5.5
        name: GPT-5.5
        description: Current Codex ChatGPT model
      - id: gpt-5.4
        name: GPT-5.4
      - id: gpt-5.3-codex
        name: GPT-5.3 Codex
